<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Southville Gate Pass System — Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── RESET & BASE ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --school:#422467;--school-d:#2e1847;--school-l:#5a3285;--school-s:#f0ebf7;
  --teal:#00c9b1;--teal-d:#00a899;--teal-s:#e0faf7;
  --bg:#f5f4f8;--white:#fff;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#1f2937;--text2:#6b7280;--text3:#9ca3af;
  --green:#16a34a;--green-s:#dcfce7;
  --yellow:#d97706;--yellow-s:#fef9c3;
  --red:#dc2626;--red-s:#fee2e2;
  --orange:#ea580c;--orange-s:#ffedd5;
  --blue:#2563eb;--blue-s:#dbeafe;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit}
input,select,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}

/* ── APP SHELL ──────────────────────────────────────────────── */
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--school);display:flex;flex-direction:column;position:relative;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;box-shadow:var(--shadow)}
.content{flex:1;overflow-y:auto;padding:22px}

/* ── SIDEBAR ────────────────────────────────────────────────── */
.logo-wrap{padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#003d35;flex-shrink:0}
.logo-name{font-size:11px;font-weight:700;color:#fff;line-height:1.3}
.logo-sy{font-size:10px;color:var(--teal);font-weight:600;letter-spacing:.04em}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.09em;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7.5px 10px;border-radius:var(--radius-sm);color:rgba(255,255,255,.65);font-size:12.5px;cursor:pointer;transition:.15s;margin-bottom:1px;position:relative;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--teal);border-radius:0 3px 3px 0}
.nav-badge{background:var(--teal);color:#003d35;border-radius:99px;font-size:9.5px;font-weight:700;padding:1px 6px;margin-left:auto}
.sidebar-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.1)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s}
.user-pill:hover{background:rgba(255,255,255,.08)}
.av{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#003d35;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.uname{font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urole{font-size:10px;color:rgba(255,255,255,.45)}
.logout{font-size:10.5px;color:rgba(255,255,255,.35);padding:3px 10px;cursor:pointer;transition:.15s;background:none;border:none;width:100%;text-align:left}
.logout:hover{color:rgba(255,255,255,.7)}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar-title{font-size:15px;font-weight:700;flex:1;color:var(--text)}
.campus-badge{background:var(--school-s);color:var(--school);border:1px solid rgba(66,36,103,.2);border-radius:99px;padding:4px 11px;font-size:11px;font-weight:600}

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;border:none;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-school{background:var(--school);color:#fff}.btn-school:hover{background:var(--school-l)}
.btn-teal{background:var(--teal);color:#003d35;font-weight:700}.btn-teal:hover{background:var(--teal-d)}
.btn-ghost{background:#fff;color:var(--school);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--school-s)}
.btn-danger{background:var(--red-s);color:var(--red);border:1px solid rgba(220,38,38,.2)}.btn-danger:hover{background:#fecaca}
.btn-success{background:var(--green-s);color:var(--green);border:1px solid rgba(22,163,74,.2)}.btn-success:hover{background:#bbf7d0}
.btn-warn{background:var(--yellow-s);color:var(--yellow);border:1px solid rgba(217,119,6,.2)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ── CARDS ──────────────────────────────────────────────────── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:10px}
.card-title{font-size:13.5px;font-weight:700;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── STATS ──────────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-ico{font-size:22px;margin-bottom:8px}
.stat-val{font-size:26px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500;margin-top:4px}
.stat-sub{font-size:10.5px;margin-top:5px}

/* ── TABLE ──────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:#fafafa;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tbl-actions{display:flex;gap:5px;opacity:0;transition:.15s}
tr:hover .tbl-actions{opacity:1}

/* ── BADGES ─────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.b-active{background:var(--green-s);color:var(--green)}.b-active::before{background:var(--green)}
.b-pending{background:var(--yellow-s);color:var(--yellow)}.b-pending::before{background:var(--yellow)}
.b-approved{background:#d1fae5;color:#065f46}.b-approved::before{background:#059669}
.b-rejected{background:var(--red-s);color:var(--red)}.b-rejected::before{background:var(--red)}
.b-suspended{background:var(--orange-s);color:var(--orange)}.b-suspended::before{background:var(--orange)}
.b-revoked{background:#fecdd3;color:#9f1239}.b-revoked::before{background:#be123c}
.b-expired{background:#f3f4f6;color:var(--text3)}.b-expired::before{background:var(--text3)}
.b-perm{background:var(--school-s);color:var(--school)}.b-perm::before{background:var(--school)}
.b-temp{background:var(--teal-s);color:var(--teal-d)}.b-temp::before{background:var(--teal)}
.b-forapproval{background:var(--blue-s);color:var(--blue)}.b-forapproval::before{background:var(--blue)}

/* ── FORMS ──────────────────────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.fi{background:#fafafa;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);outline:none;width:100%;transition:.15s;font-size:13px}
.fi:focus{border-color:var(--school);box-shadow:0 0 0 3px rgba(66,36,103,.1);background:#fff}
select.fi{background:#fafafa}
textarea.fi{resize:vertical;min-height:68px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.chk-row{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:6px 0}
.chk-row input[type=checkbox]{accent-color:var(--school);width:15px;height:15px}

/* ── MODAL ──────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);width:540px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{width:680px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:14.5px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#fafafa;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.close-btn{width:28px;height:28px;border-radius:99px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2)}
.close-btn:hover{background:var(--red-s);color:var(--red)}

/* ── FILTER PILLS ────────────────────────────────────────────── */
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:4px 12px;border-radius:99px;font-size:11.5px;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:.15s;font-weight:500;background:#fff}
.pill:hover{border-color:var(--border2);color:var(--text)}
.pill.on{background:var(--school-s);color:var(--school);border-color:rgba(66,36,103,.3);font-weight:600}

/* ── SEARCH ─────────────────────────────────────────────────── */
.search-wrap{position:relative}
.search-wrap input{padding-left:30px}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

/* ── PASS CARD ───────────────────────────────────────────────── */
.pass-card{background:linear-gradient(180deg,#0d1a3a 0%,#0a1228 100%);border-radius:18px;width:300px;margin:0 auto;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid rgba(0,201,177,.2)}
.pass-hdr{background:#00c9b1;padding:13px 16px;text-align:center}
.pass-school{font-size:9px;font-weight:800;color:#003d35;letter-spacing:.08em;text-transform:uppercase}
.pass-title{font-size:15px;font-weight:900;color:#003d35;letter-spacing:.03em;margin:1px 0}
.pass-type-lbl{font-size:8px;font-weight:700;color:#005548;letter-spacing:.1em;text-transform:uppercase}
.pass-body{padding:18px 16px}
.pass-photo{width:76px;height:76px;border-radius:50%;border:3px solid #00c9b1;margin:0 auto 12px;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#00c9b1}
.pass-name{font-size:17px;font-weight:800;color:#fff;text-align:center;margin-bottom:2px}
.pass-grade{font-size:11.5px;color:#8892aa;text-align:center;margin-bottom:13px}
.pass-hr{height:1px;background:rgba(255,255,255,.07);margin:11px 0}
.pass-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pf{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px}
.pf-lbl{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#00c9b1;margin-bottom:2px}
.pf-val{font-size:11.5px;font-weight:700;color:#fff}
.pf-val.mono{font-family:monospace;font-size:10.5px;color:#00c9b1}
.pf-val.ok{color:#3ddc84}
.pass-exit{background:rgba(0,201,177,.09);border:1px solid rgba(0,201,177,.22);border-radius:8px;padding:7px 10px;font-size:10px;color:#00c9b1;font-weight:600;text-align:center;margin-bottom:13px}
.pass-qr{background:#fff;border-radius:10px;padding:9px;display:flex;justify-content:center;align-items:center;margin-bottom:9px}
.pass-scan-lbl{font-size:8px;font-weight:800;color:#00c9b1;letter-spacing:.12em;text-align:center;text-transform:uppercase;margin-bottom:11px}
.pass-foot{padding:9px 16px;border-top:1px solid rgba(255,255,255,.05);text-align:center;font-size:9px;color:#4a5568}

/* ── SCANNER ─────────────────────────────────────────────────── */
.scan-area{background:var(--school-s);border:2px dashed rgba(66,36,103,.25);border-radius:var(--radius);padding:28px;text-align:center}
.scan-ring{width:80px;height:80px;border:3px solid var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,201,177,.4)}50%{box-shadow:0 0 0 12px rgba(0,201,177,0)}}
.scan-ok{background:#f0fdf4;border:2px solid #86efac;border-radius:var(--radius);padding:14px;margin-top:12px}
.scan-fail{background:var(--red-s);border:2px solid #fca5a5;border-radius:var(--radius);padding:14px;margin-top:12px}
.feed-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.feed-row:last-child{border-bottom:none}

/* ── ALERTS ──────────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12.5px;margin-bottom:14px}
.alert-info{background:var(--school-s);border:1px solid rgba(66,36,103,.2);color:var(--school)}
.alert-warn{background:var(--yellow-s);border:1px solid rgba(217,119,6,.25);color:var(--yellow)}
.alert-teal{background:var(--teal-s);border:1px solid rgba(0,201,177,.3);color:#007a6e}
.alert-success{background:var(--green-s);border:1px solid rgba(22,163,74,.25);color:var(--green)}

/* ── TABS ────────────────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:12.5px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;font-weight:500}
.tab:hover{color:var(--text)}
.tab.on{color:var(--teal-d);border-bottom-color:var(--teal);font-weight:600}

/* ── MISC ────────────────────────────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--text2)}
.empty-ico{font-size:38px;margin-bottom:12px;opacity:.3}
.empty-txt{font-size:13.5px;font-weight:600}
.empty-sub{font-size:11.5px;color:var(--text3);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.items-c{align-items:center}.justify-b{justify-content:space-between}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.muted{color:var(--text2)}.danger{color:var(--red)}.success{color:var(--green)}.teal{color:var(--teal-d)}
.bold{font-weight:700}.mono{font-family:monospace}
.bar-bg{background:#f3f4f6;border-radius:4px;height:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.divider{height:1px;background:var(--border);margin:14px 0}
.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;animation:toastin .2s ease;max-width:320px}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LOGIN ───────────────────────────────────────────────────── */
.login-bg{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(66,36,103,.35) 0%,transparent 55%),#f5f4f8}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:38px;width:390px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.login-logo{width:58px;height:58px;background:var(--school);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;border:3px solid var(--teal)}
.rq{padding:4px 10px;border-radius:99px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--text2);transition:.15s;font-weight:500;background:transparent}
.rq:hover,.rq.sel{background:var(--school-s);color:var(--school);border-color:rgba(66,36,103,.3)}

/* ── REPORT BARS ─────────────────────────────────────────────── */
.rbar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12px}
.rbar-lbl{width:88px;color:var(--text2);text-align:right;flex-shrink:0;font-size:11px}
.rbar-val{width:28px;text-align:right;font-weight:700;flex-shrink:0}

/* ── VIDEO/CAMERA ────────────────────────────────────────────── */
#cam-video{width:100%;border-radius:10px;display:none;background:#000;max-height:220px;object-fit:cover}
</style>
</head>

const g = id => document.getElementById(id);
const campus = id => CAMPUSES.find(c=>c.id===id);
const student = id => DB.students.find(s=>s.id===id);
const pass = id => DB.passes.find(p=>p.id===id);

const initials = name => { const p=name.split(','); return (p[0]?.[0]||'')+(p[1]?.trim()[0]||'') };
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}) : '—';
const fmtDT = d => d ? new Date(d).toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const today = () => '2026-06-22';
const genPGP = () => { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let r='PGP-'; for(let i=0;i<8;i++)r+=c[Math.floor(Math.random()*c.length)]; r+='-'; for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)]; return r; };
const genTGP = () => `TGP-2026-${String(++DB.tgpCounter).padStart(4,'0')}`;
const can = roles => roles.includes(DB.currentUser?.role);
const statusBadge = s => ({active:'b-active',pending:'b-pending',approved:'b-approved',rejected:'b-rejected',suspended:'b-suspended',revoked:'b-revoked',expired:'b-expired',for_approval:'b-forapproval'}[s]||'b-expired');

let S = { page:'login', modal:null, mdata:{}, fPass:'all', fType:'all', fCampus:'all', search:'', searchS:'', tab:0, scanResult:null, scanInput:'', toast:null };
function set(patch){Object.assign(S,patch);render();}
function toast(msg,type='ok'){
  S.toast={msg,type};render();
  setTimeout(()=>{S.toast=null;render();},3200);
}

// RENDER ENGINE
// ════════════════════════════════════════════════════════════════
function render(){
  const root=g('root');
  if(S.page==='login'){root.innerHTML=rLogin();bindLogin();return;}
  root.innerHTML=`
    ${S.toast?rToast():''}
    ${S.modal?rModal():''}
    <div class="app">
      ${rSidebar()}
      <div class="main">
        ${rTopbar()}
        <div class="content" id="page-content">${rPage()}</div>
      </div>
    </div>`;
  bindAll();
  // QR rendering — uses polling internally, no need for extra timeout
  if(S.page==='scanner'&&S.scanResult?.pa) renderQR('sr-qr', S.scanResult.pa.no, 68);
  if(S.modal==='viewPass') renderQR('modal-qr', S.mdata.passId ? DB.passes.find(p=>p.id===S.mdata.passId)?.no : null, 94);
}

function doScan(){
  const input=S.scanInput.trim().toUpperCase();
  if(!input){toast('Enter a pass number','warn');return;}
  const pa=DB.passes.find(p=>p.no===input||p.no===input);
  if(!pa){set({scanResult:{ok:false,reason:'Pass not found in the system.',st:null,pa:{id:null,no:input,gates:[],exit:'',type:'',status:''}}});return;}
  const st=student(pa.sid);
  let denied=false,reason='';
  if(pa.status==='revoked'){denied=true;reason='This pass has been permanently revoked.';}
  else if(pa.status==='suspended'){denied=true;reason='This pass is currently suspended.';}
  else if(pa.status==='rejected'){denied=true;reason='This pass application was rejected.';}
  else if(pa.type==='permanent'&&pa.status!=='active'){denied=true;reason=`Pass status is '${pa.status}' — must be active.`;}
  else if(pa.type==='temporary'){
    if(pa.status!=='approved'){denied=true;reason='Temporary pass is not yet approved.';}
    else if(pa.from!==today()){denied=true;reason=`Temporary pass only valid on ${fmtDate(pa.from)}.`;}
  }
  set({scanResult:{ok:!denied,reason:denied?reason:'Valid pass — all checks passed.',st,pa}});
}

function logExit(passId,studentId){
  const pa=pass(passId),st=student(studentId);
  if(!pa||!st)return;
  const gate=(pa.gates||['Gate 1'])[0];
  const myc=DB.currentUser.campus;
  DB.logs.push({id:'l'+Date.now(),pid:passId,sid:studentId,gate,campus:myc,at:new Date().toISOString(),result:'granted',method:'camera'});
  toast(`✅ Exit logged for ${st.name}. Email sent to ${st.pEmail}`,'ok');
  set({scanResult:null,scanInput:''});
}

let camStream=null,scanInt=null;
function startCamera(){
  const ph=g('cam-placeholder');const vid=g('cam-video');const stat=g('cam-status');
  if(!navigator.mediaDevices?.getUserMedia){toast('Camera not available in this browser','warn');return;}
  if(ph)ph.style.display='none';
  if(stat)stat.textContent='📡 Scanning… hold QR code steady';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}})
    .then(stream=>{
      camStream=stream;vid.srcObject=stream;vid.style.display='block';vid.play();
      scanInt=setInterval(()=>{
        const c=g('cam-canvas');if(!c||!vid.videoWidth)return;
        c.width=vid.videoWidth;c.height=vid.videoHeight;
        const ctx=c.getContext('2d');ctx.drawImage(vid,0,0);
        const id=ctx.getImageData(0,0,c.width,c.height);
        if(window.jsQR){
          const code=jsQR(id.data,id.width,id.height,{inversionAttempts:'attemptBoth'});
          if(code){stopCamera();S.scanInput=code.data;set({tab:0});setTimeout(doScan,100);}
        }
      },400);
    })
    .catch(()=>{if(ph)ph.style.display='block';toast('Camera access denied. Use manual input.','warn');});
}
function stopCamera(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}clearInterval(scanInt);}

function renderQR(elId, data, size){
  size = size || 94;
  // Retry up to 20 times every 80ms — waits for DOM to fully paint after render()
  let tries = 0;
  const attempt = () => {
    const el = g(elId);
    if (!el) { if (++tries < 20) setTimeout(attempt, 80); return; }
    if (el.children.length > 0) return; // already rendered
    if (!data) { el.innerHTML = '<div style="font-size:9px;color:#999;text-align:center;padding:8px">No QR data</div>'; return; }
    try {
      new QRCode(el, {
        text: String(data),
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    } catch(e) {
      el.innerHTML = `<div style="font-size:8px;color:#333;word-break:break-all;padding:4px;text-align:center">${data}</div>`;
    }
  };
  setTimeout(attempt, 60);
}

function quickApprove(id){
  const pa=DB.passes.find(p=>p.id===id);if(!pa)return;
  pa.status=pa.type==='temporary'?'approved':'active';
  pa.by=DB.currentUser.id;pa.at=today();
  const st=student(pa.sid);
  toast(`✅ Pass approved for ${st?.name}. Email sent to ${st?.pEmail}`);
  render();
}
function quickSuspend(id){
  const pa=DB.passes.find(p=>p.id===id);if(pa){pa.status='suspended';toast('Pass suspended','warn');render();}
}
function quickReactivate(id){
  const pa=DB.passes.find(p=>p.id===id);if(pa){pa.status='active';toast('Pass reactivated');render();}
}
function processTGP(id){
  const pa=DB.passes.find(p=>p.id===id);if(pa){pa.status='for_approval';toast('TGP forwarded to Discipline Head');render();}
}

function submitPGP(){
  const sid=g('pgp-sid')?.value;
  const gates=[...document.querySelectorAll('input[name="pgp-gate"]:checked')].map(x=>x.value);
  const exit=g('pgp-exit')?.value;
  const from=g('pgp-from')?.value;
  const until=g('pgp-until')?.value;
  if(!sid){alert('Select a student.');return;}
  if(gates.length===0){alert('Select at least one gate.');return;}
  const st=student(sid);
  if(DB.passes.find(p=>p.sid===sid&&p.type==='permanent'&&p.status==='active')){alert('This student already has an active permanent pass.');return;}
  DB.passes.push({id:'p'+Date.now(),sid,no:genPGP(),type:'permanent',status:'pending',gates,exit,from,until,by:null,at:null,sy:SY});
  toast(`PGP application submitted for ${st?.name}. Awaiting approval.`);closeModal();render();
}

function submitTGP(){
  const sid=g('tgp-sid')?.value;
  const date=g('tgp-date')?.value;
  const gate=g('tgp-gate')?.value;
  const exit=g('tgp-exit')?.value;
  const remarks=g('tgp-remarks')?.value;
  if(!sid||!date||!remarks){alert('Fill all required fields.');return;}
  const st=student(sid);
  DB.passes.push({id:'t'+Date.now(),sid,no:genTGP(),type:'temporary',status:'pending',gates:[gate],exit,from:date,until:date,by:null,at:null,sy:SY});
  toast(`TGP request submitted for ${st?.name}`);closeModal();render();
}

function submitStudent(){
  const name=g('ns-name')?.value?.trim();
  const sid=g('ns-sid')?.value?.trim();
  if(!name||!sid){alert('Name and Student ID required.');return;}
  if(DB.students.find(s=>s.sid===sid)){alert('Student ID already exists.');return;}
  const photos=['👦','👧','🧑'];
  DB.students.push({id:'s'+Date.now(),name,sid,grade:g('ns-grade')?.value||'Grade 7',section:g('ns-sec')?.value||'General',division:g('ns-div')?.value||'K12',campus:g('ns-campus')?.value||'lux',parent:g('ns-parent')?.value||'',pEmail:g('ns-email')?.value||'',photo:photos[Math.floor(Math.random()*3)],status:'active'});
  toast('Student added successfully');closeModal();render();
}

function submitUser(){
  const name=g('nu-name')?.value?.trim();
  const email=g('nu-email')?.value?.trim();
  const pw=g('nu-pw')?.value;
  if(!name||!email||!pw){alert('All fields required.');return;}
  if(!email.endsWith('@southville.edu.ph')&&!email.endsWith('@sgen.edu.ph')){alert('Must use a Southville school email.');return;}
  if(DB.users.find(u=>u.email===email)){alert('Email already registered.');return;}
  const av=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  DB.users.push({id:'u'+Date.now(),name,email,role:g('nu-role')?.value||'secretary',campus:g('nu-campus')?.value||'lux',pw,av});
  toast('User created');closeModal();render();
}

function processBatch(){
  const text=g('batch-text')?.value?.trim();
  if(!text){toast('Paste CSV data first','warn');return;}
  const lines=text.split('\n').filter(l=>l.trim()&&!l.toLowerCase().startsWith('full_name'));
  let added=0,skipped=0;
  lines.forEach(line=>{
    const parts=line.split(',').map(p=>p.replace(/^"|"$/g,'').trim());
    if(parts.length<6)return;
    const [name,sid,grade,section,division,campusCode,,parentName,parentEmail]=parts;
    if(!name||!sid)return;
    if(DB.students.find(s=>s.sid===sid)){skipped++;return;}
    const c=CAMPUSES.find(c=>c.id===campusCode);
    if(!c){skipped++;return;}
    const photos=['👦','👧','🧑'];
    DB.students.push({id:'s'+Date.now()+Math.random(),name,sid,grade:grade||'Grade 7',section:section||'General',division:division||'K12',campus:c.id,parent:parentName||'',pEmail:parentEmail||'',photo:photos[Math.floor(Math.random()*3)],status:'active'});
    added++;
  });
  toast(`✅ ${added} student(s) added, ${skipped} skipped`);closeModal();render();
}

function saveEditStudent(id){
  const st = DB.students.find(s=>s.id===id);
  if(!st) return;
  const newSid = g('es-sid')?.value?.trim();
  const newName = g('es-name')?.value?.trim();
  if(!newName||!newSid){alert('Name and Student ID are required.');return;}
  if(newSid !== st.sid && DB.students.find(s=>s.sid===newSid)){alert('Student ID already exists.');return;}
  st.name    = newName;
  st.sid     = newSid;
  st.grade   = g('es-grade')?.value?.trim() || st.grade;
  st.section = g('es-section')?.value?.trim() || st.section;
  st.division= g('es-div')?.value || st.division;
  st.campus  = g('es-campus')?.value || st.campus;
  st.parent  = g('es-parent')?.value?.trim() || st.parent;
  st.pEmail  = g('es-email')?.value?.trim() || st.pEmail;
  st.status  = g('es-status')?.value || st.status;
  toast(`✅ Student record updated for ${st.name}`);
  closeModal();
  render();
}

// ── DOWNLOAD PASS AS PNG / JPEG ───────────────────────────────────
function downloadPass(fmt){
  const el = g('pass-card-modal');
  if(!el){toast('Pass card not found','danger');return;}
  // Ensure QR is rendered before capture
  const qrEl = g('modal-qr');
  const doCapture = () => {
    html2canvas(el, {
      backgroundColor: null,
      scale: 3,           // high resolution
      useCORS: true,
      allowTaint: true,
      logging: false,
    }).then(canvas => {
      const pa = DB.passes.find(p=>p.id===S.mdata.passId);
      const fname = `GatePass-${pa?.no||'SISC'}.${fmt}`;
      const type = fmt==='png' ? 'image/png' : 'image/jpeg';
      const quality = fmt==='jpeg' ? 0.95 : 1;
      const link = document.createElement('a');
      link.download = fname;
      link.href = canvas.toDataURL(type, quality);
      link.click();
      toast(`✅ Downloaded as ${fname}`);
    }).catch(e=>{
      toast('Download failed — try Print instead','danger');
    });
  };
  // If QR not yet rendered, wait a bit more
  if(qrEl && qrEl.children.length === 0){
    setTimeout(doCapture, 600);
  } else {
    doCapture();
  }
}

function rToast(){
  const t=S.toast;
  const styles={ok:'border-color:#86efac;color:var(--green)',warn:'border-color:#fde68a;color:var(--yellow)',danger:'border-color:#fca5a5;color:var(--red)'};
  const icons={ok:'✅',warn:'⚠️',danger:'❌'};
  return `<div class="toast" style="${styles[t.type||'ok']||styles.ok}">
    <span>${icons[t.type||'ok']||icons.ok}</span><span>${t.msg}</span>
  </div>`;}
